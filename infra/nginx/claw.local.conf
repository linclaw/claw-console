# claw-console — nginx reverse proxy
#
# Serves the whole app at http://claw.local (port 80) from a single origin, so
# LAN devices use a clean hostname with no port number:
#
#     browser ──> nginx :80 ──> Vite dev server 127.0.0.1:5174
#                                 └─ /ws, /api, /healthz, /readyz ─> gateway
#
# The app talks to the OpenClaw gateway over a relative path (ws://<host>/ws),
# so everything rides one origin: nginx forwards to Vite, and Vite's own proxy
# (vite.config.ts) forwards the gateway paths on to 127.0.0.1:18789. nginx only
# needs the privileged port 80.
#
# `claw.local` resolves LAN-wide via mDNS/Bonjour (see infra/mdns/). The machine
# itself answers to gym.local natively; claw.local is advertised on top of it,
# and nginx routes the two by Host header (server_name). Deploy: infra/README.md.

# Maps the Upgrade request header to the Connection response header so nginx
# proxies WebSocket upgrades (Vite HMR + the gateway /ws socket) correctly.
# Uniquely named so it can't collide with the map in another site's config that
# nginx loads from the same `include servers/*;`.
map $http_upgrade $claw_connection_upgrade {
    default upgrade;
    ''      close;
}

upstream claw_console_frontend { server 127.0.0.1:5174; }

server {
    listen 80;
    listen [::]:80;
    server_name claw.local;

    # Stream proxied responses straight through instead of buffering to temp
    # files. The dev server emits large JS chunks; with buffering on, an nginx
    # worker (running as `nobody`) can fail a proxy_temp write and truncate the
    # response — the browser reports ERR_CONTENT_LENGTH_MISMATCH. Off is correct
    # for a dev / streaming upstream.
    proxy_buffering off;

    location / {
        proxy_pass http://claw_console_frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (Vite HMR + gateway /ws). Long read timeout keeps the
        # gateway socket from being closed by nginx during idle periods.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $claw_connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
